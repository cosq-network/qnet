name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Restore vcpkg from cache
      id: vcpkg-cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg_installed
        key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-${{ matrix.os }}-

    - name: Bootstrap vcpkg
      if: steps.vcpkg-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git clone --depth=1 https://github.com/Microsoft/vcpkg.git "${{ runner.temp }}/vcpkg"
        "${{ runner.temp }}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        # Sync builtin-baseline to match the cloned repository's HEAD
        BASELINE=$(git -C "${{ runner.temp }}/vcpkg" rev-parse HEAD)
        echo "Syncing vcpkg baseline to $BASELINE"
        python3 - <<PY
        import json

        path = "vcpkg.json"
        with open(path, "r", encoding="utf-8") as f:
            data = json.load(f)

        data["builtin-baseline"] = "${BASELINE}"

        with open(path, "w", encoding="utf-8") as f:
            json.dump(data, f, indent=2)
            f.write("\n")
        PY

    - name: Restore vcpkg build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.temp }}/vcpkg_installed
          ${{ runner.temp }}/vcpkg/buildtrees
          ${{ runner.temp }}/vcpkg/packages
          ${{ runner.temp }}/vcpkg/downloads
        key: vcpkg-build-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-build-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}-
          vcpkg-build-${{ matrix.os }}-

    - name: Configure CMake
      shell: bash
      run: |
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_TOOLCHAIN_FILE="${{ runner.temp }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_INSTALLED_DIR="${{ runner.temp }}/vcpkg_installed" \
          -DBUILD_TESTS=ON \
          -DBUILD_PYTHON_BINDINGS=OFF

    - name: Build
      shell: bash
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Test
      shell: bash
      run: ctest --test-dir build --output-on-failure -C ${{ env.BUILD_TYPE }}

    - name: Package (CPack)
      if: github.event_name == 'release'
      shell: bash
      run: |
        cpack --config build/CPackConfig.cmake -B "${{ runner.temp }}/packages"

    - name: Upload artifact
      if: github.event_name == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: qnet-${{ matrix.os }}-${{ env.BUILD_TYPE }}
        path: ${{ runner.temp }}/packages/

  release:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Upload to release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        shopt -s globstar
        for file in artifacts/**/*.tar.gz artifacts/**/*.zip; do
          [ -f "$file" ] && gh release upload "${{ github.event.release.tag_name }}" "$file"
        done
